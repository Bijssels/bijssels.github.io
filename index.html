<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Media Apps</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
        }
        .app-button {
            display: flex;
            align-items: center;
            background-color: white;
            border: 1px solid #ccc;
            border-radius: 8px;
            margin-bottom: 15px;
            padding: 10px;
            text-decoration: none;
            color: #333;
            transition: background-color 0.3s;
        }
        .app-button:hover {
            background-color: #f0f0f0;
        }
        .app-button img {
            width: 50px;
            height: 50px;
            margin-right: 15px;
        }
        .app-button span {
            font-size: 18px;
        }
    </style>
</head>
<body>

    <h1>Social Media Apps</h1>

    <a href="https://www.instagram.com/jouwaccount" class="app-button" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/9/95/Instagram_logo_2022.svg" alt="Instagram">
        <span>Instagram</span>
    </a>

    <a href="https://twitter.com/jouwaccount" class="app-button" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/6/60/Twitter_Logo_2021.svg" alt="Twitter">
        <span>Twitter</span>
    </a>

    <a href="https://www.facebook.com/jouwaccount" class="app-button" target="_blank">
        <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook">
        <span>Facebook</span>
    </a>

</body>
</html>
